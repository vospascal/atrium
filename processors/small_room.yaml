# Processor chain: Small Reflective Room
# Processors run in order on the mixed output buffer.
# Each processor adds spatial character to the dry signal.

# Image-source early reflections (Allen & Berkley 1979)
# Simulates first-order wall reflections — gives the brain cues about room size.
- type: early_reflections
  wet_gain: 0.5            # reflection mix level (0.0–1.0, typical 0.3–0.5)
  wall_reflectivity: 0.9   # wall reflectivity (0.0 = absorbs all, 1.0 = perfect mirror)

# Feedback Delay Network reverb (8-line)
# Simulates late diffuse reverberation — the "tail" after early reflections.
# Used by VBAP, HRTF, and other non-Ambisonics pipelines.
- type: fdn_reverb
  wet_gain: 0.2            # reverb mix level (0.0–1.0, typical 0.15–0.3 for small rooms)
  rt60_low: 0.8            # low-frequency decay time in seconds
  rt60_high: 0.3           # high-frequency decay time (always <= rt60_low)

# Ambisonics multi-delay spatial reverb (Rudrich et al. 2016)
# B-format feedback delay with 72-degree rotation per iteration.
# Used only by the Ambisonics pipeline (replaces FDN in that mode).
- type: ambi_multi_delay
  ambi_multi_delay: 0.15   # reverb mix level (0.0–1.0, typical 0.1–0.2 for small rooms)
