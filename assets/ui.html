<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atrium Control</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #ccc; font-family: 'SF Mono', 'Fira Code', monospace; overflow: hidden; }
  canvas { display: block; }
  #hud {
    position: absolute; top: 16px; left: 16px;
    background: rgba(0,0,0,0.7); padding: 12px 16px; border-radius: 8px;
    font-size: 12px; line-height: 1.6; pointer-events: auto;
    min-width: 220px;
  }
  #hud h2 { font-size: 14px; color: #fff; margin-bottom: 6px; }
  #hud .row { display: flex; justify-content: space-between; align-items: center; }
  #hud label { color: #999; }
  #hud .val { color: #4fc3f7; }
  #status { margin-top: 8px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
  .connected { background: #4caf50; }
  .disconnected { background: #f44336; }
  input[type=range] { width: 120px; margin-left: 8px; accent-color: #4fc3f7; }
  input[type=checkbox] { accent-color: #4fc3f7; margin-left: 8px; }
  .source-row { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .source-name { font-size: 11px; }
  .mute-btn {
    background: none; border: 1px solid #555; color: #999; font-size: 10px;
    padding: 1px 6px; border-radius: 4px; cursor: pointer; font-family: inherit;
  }
  .mute-btn:hover { border-color: #888; color: #ccc; }
  .mute-btn.muted { border-color: #f44336; color: #f44336; }
  .gain-readout { font-size: 10px; color: #666; margin-top: 1px; font-variant-numeric: tabular-nums; }
  #render-panel { margin-top: 8px; border-top: 1px solid #333; padding-top: 6px; }
  #render-panel h3 { font-size: 12px; color: #999; margin-bottom: 4px; }
  .mode-btns { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .mode-btn {
    background: none; border: 1px solid #555; color: #999; font-size: 10px;
    padding: 3px 8px; border-radius: 4px; cursor: pointer; font-family: inherit;
  }
  .mode-btn:hover { border-color: #888; color: #ccc; }
  .mode-btn.active { border-color: #4fc3f7; color: #4fc3f7; background: rgba(79,195,247,0.1); }
  #sources-panel { margin-top: 8px; border-top: 1px solid #333; padding-top: 6px; }
  #sources-panel h3 { font-size: 12px; color: #999; margin-bottom: 4px; }
  .orbit-controls { margin: 2px 0 4px; }
  .orbit-controls .row { display: flex; align-items: center; gap: 4px; margin-top: 2px; }
  .orbit-controls label { font-size: 10px; color: #777; min-width: 40px; }
  .orbit-controls input[type=range] { width: 70px; }
  .orbit-controls .val { font-size: 10px; color: #aaa; min-width: 30px; }
  .pause-btn { background: none; border: 1px solid #555; color: #4fc3f7; font-size: 10px;
    padding: 1px 6px; border-radius: 4px; cursor: pointer; font-family: inherit; }
  .pause-btn:hover { border-color: #4fc3f7; }
  .pause-btn.paused { border-color: #ff9800; color: #ff9800; }
  #help {
    position: absolute; bottom: 16px; left: 16px;
    background: rgba(0,0,0,0.7); padding: 10px 14px; border-radius: 8px;
    font-size: 11px; color: #666; line-height: 1.5;
  }
</style>
</head>
<body>

<div id="hud">
  <h2>Atrium Control</h2>
  <div class="row"><label>Listener</label><span class="val" id="listener-pos">0, 0, 0</span></div>
  <div class="row"><label>Yaw</label><span class="val" id="listener-yaw">0°</span></div>
  <div class="row">
    <label>Gain</label>
    <input type="range" id="gain-slider" min="0" max="100" value="70">
    <span class="val" id="gain-val">0.70</span>
  </div>
  <div id="sources-panel">
    <h3>Sources</h3>
  </div>
  <div id="render-panel">
    <h3>Render Mode</h3>
    <div class="mode-btns">
      <button class="mode-btn active" data-mode="world_locked">WorldLocked</button>
      <button class="mode-btn" data-mode="vbap">VBAP</button>
      <button class="mode-btn" data-mode="stereo">Stereo</button>
      <button class="mode-btn" data-mode="binaural">Binaural</button>
    </div>
  </div>
  <div id="atmosphere-panel" style="margin-top:8px;border-top:1px solid #333;padding-top:6px;">
    <h3>Atmosphere</h3>
    <div class="row">
      <label>Temp</label>
      <input type="range" id="atmo-temp" min="-10" max="45" step="1" value="20" style="width:80px">
      <span class="val" id="atmo-temp-val">20°C</span>
    </div>
    <div class="row">
      <label>Humidity</label>
      <input type="range" id="atmo-humidity" min="0" max="100" step="1" value="50" style="width:80px">
      <span class="val" id="atmo-humidity-val">50%</span>
    </div>
    <div id="atmo-readout" style="font-size:10px;color:#666;margin-top:4px;font-variant-numeric:tabular-nums;">
      α: 1kHz 0.005 · 4kHz 0.020 · 8kHz 0.060 dB/m
    </div>
  </div>
  <div id="status"><span class="dot disconnected" id="status-dot"></span><span id="status-text">Connecting...</span></div>
  <div style="margin-top:8px;border-top:1px solid #333;padding-top:6px;">
    <button id="reset-btn" style="background:none;border:1px solid #555;color:#999;font-size:11px;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit;width:100%;">Reset Scene</button>
  </div>
</div>

<div id="help">
  Drag listener (white) or sources to move &middot; Space+Scroll to rotate yaw &middot; Scroll to zoom &middot; Right-drag to orbit &middot; Space+Right-drag to pan
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// === Scene state (all values received from engine via WebSocket scene_state message) ===
// No hardcoded physics values — everything comes from the engine's computed scene.
let ROOM = { w: 6, d: 4, h: 3 };   // updated on scene_state
let DIST_MODEL = { refDist: 1.0, maxDist: 20.0, rolloff: 1.0 };  // updated on scene_state
let SOURCES = [];  // populated from engine scene_state
// Speaker layout — received from engine via scene_state message.
// These defaults are used only until the first WebSocket message arrives.
let SPEAKERS = [
  { label: 'FL', x: 0, y: 4, z: 0, channel: 0, color: 0x66bb6a },
  { label: 'FR', x: 6, y: 4, z: 0, channel: 1, color: 0x66bb6a },
  { label: 'C',  x: 3, y: 4, z: 0, channel: 2, color: 0x66bb6a },
  { label: 'RL', x: 0, y: 0, z: 0, channel: 4, color: 0x66bb6a },
  { label: 'RR', x: 6, y: 0, z: 0, channel: 5, color: 0x66bb6a },
];
let currentRenderMode = 'world_locked';

// Which speaker channels are visible per render mode
const MODE_ACTIVE_CHANNELS = {
  world_locked:   [0, 1, 2, 4, 5],
  vbap:           [0, 1, 2, 4, 5],
  stereo:         [0, 1],
  binaural:       [],
};

function updateSpeakerVisibility() {
  const active = MODE_ACTIVE_CHANNELS[currentRenderMode] || [0, 1, 2, 4, 5];
  SPEAKERS.forEach((sp, i) => {
    if (speakerMeshes[i]) speakerMeshes[i].visible = active.includes(sp.channel);
  });
}

function createSpeakerMesh(sp) {
  const group = new THREE.Group();
  const box = new THREE.Mesh(
    new THREE.BoxGeometry(0.2, 0.25, 0.15),
    new THREE.MeshStandardMaterial({ color: sp.color, emissive: sp.color, emissiveIntensity: 0.2 })
  );
  group.add(box);
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 24;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#66bb6a';
  ctx.font = '16px monospace';
  ctx.fillText(sp.label, 4, 18);
  const tex = new THREE.CanvasTexture(canvas);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sprite.scale.set(0.6, 0.2, 1);
  sprite.position.y = 0.25;
  group.add(sprite);
  group.position.copy(toThree(sp.x, sp.y, sp.z));
  return group;
}

/// Rebuild speaker meshes from data received from Rust.
function rebuildSpeakers(data) {
  // Remove old meshes
  speakerMeshes.forEach(m => scene.remove(m));
  // Update SPEAKERS array
  SPEAKERS = data.speakers.map(sp => ({
    label: sp.label, x: sp.x, y: sp.y, z: sp.z,
    channel: sp.channel, color: 0x66bb6a,
  }));
  // Create new meshes
  speakerMeshes = SPEAKERS.map(sp => {
    const group = createSpeakerMesh(sp);
    scene.add(group);
    return group;
  });
  updateSpeakerVisibility();
}

// Atrium is Z-up, Three.js is Y-up.
// Atrium (x, y, z) → Three.js (x, z, ROOM.d − y)
// The y-flip puts the front wall (y=ROOM.d) at Three.js z=0 (top of screen)
// and the rear wall (y=0) at z=ROOM.d (bottom), giving a natural map view.
function toThree(ax, ay, az) { return new THREE.Vector3(ax, az, ROOM.d - ay); }
function toAtrium(tv) { return { x: tv.x, y: ROOM.d - tv.z, z: tv.y }; }

// === Directivity pattern evaluation (mirrors Rust DirectivityPattern::gain_at_angle) ===
function patternGain(pattern, angle) {
  if (pattern.type === 'omni') return 1.0;
  if (pattern.type === 'polar') {
    // gain = alpha + (1 - alpha) * cos(theta), clamped to 0
    return Math.max(0, pattern.alpha + (1 - pattern.alpha) * Math.cos(angle));
  }
  if (pattern.type === 'cone') {
    if (angle <= pattern.inner) return 1.0;
    if (angle >= pattern.outer) return pattern.outerGain;
    const t = (angle - pattern.inner) / (pattern.outer - pattern.inner);
    return 1.0 + t * (pattern.outerGain - 1.0);
  }
  return 1.0;
}

// Generate a 3D directivity pattern as a wireframe surface of revolution.
// The polar gain curve is rotated around the forward axis (+Z local).
const POLAR_STEPS = 48;   // samples around the polar (off-axis) angle, 0 to π
const RING_STEPS = 24;    // samples around each latitude ring (azimuthal)
const PATTERN_SCALE = 0.8; // max radius in meters at gain=1.0

function createPatternMesh(pattern, color) {
  // Build a surface of revolution: for each polar angle θ (0→π),
  // the gain gives a radius, and we sweep that radius around the forward axis.
  const vertices = [];
  const indices = [];

  for (let p = 0; p <= POLAR_STEPS; p++) {
    const theta = (p / POLAR_STEPS) * Math.PI; // 0 (forward) to π (behind)
    const gain = patternGain(pattern, theta);
    const r = gain * PATTERN_SCALE;
    // r is the distance from the forward axis at this polar angle
    const rPerp = r * Math.sin(theta); // perpendicular to forward
    const zAlongFwd = r * Math.cos(theta); // along forward (+Z local)

    for (let a = 0; a <= RING_STEPS; a++) {
      const phi = (a / RING_STEPS) * Math.PI * 2;
      vertices.push(
        rPerp * Math.cos(phi),  // X
        rPerp * Math.sin(phi),  // Y (Three.js up — becomes height on the lobe)
        zAlongFwd               // Z (forward)
      );
    }
  }

  // Build wireframe indices: latitude rings + longitude lines
  for (let p = 0; p < POLAR_STEPS; p++) {
    for (let a = 0; a < RING_STEPS; a++) {
      const curr = p * (RING_STEPS + 1) + a;
      const next = curr + 1;
      const below = curr + (RING_STEPS + 1);
      // Latitude ring segment
      indices.push(curr, next);
      // Longitude line segment
      indices.push(curr, below);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
  geo.setIndex(indices);

  return new THREE.LineSegments(geo, new THREE.LineBasicMaterial({
    color, transparent: true, opacity: 0.15,
  }));
}

// Hearing pattern constant — only used for the 3D wireframe visualization mesh
const HEARING_PATTERN = {
  type: 'cone', inner: 15 * Math.PI / 180, outer: 45 * Math.PI / 180, outerGain: 0.3
};

// === State ===
// Latest telemetry from the engine (per-source gains, positions, distances)
let latestTelemetry = null;
let listener = { x: 3, y: 2, z: 0, yaw: Math.PI / 2 };
let ws = null;
let dragTarget = null; // null | 'listener' | source index (number)
let sourceMuted = [];
const startTime = performance.now() / 1000;

// === Three.js setup ===
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(3, 8, 10);
camera.lookAt(3, 0, 2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Camera controls (right-drag to orbit, scroll to zoom)
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(ROOM.w / 2, 0, ROOM.d / 2);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };
controls.update();

// === Lights ===
scene.add(new THREE.AmbientLight(0x404040, 2));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// === Room wireframe ===
const roomGeo = new THREE.BoxGeometry(ROOM.w, ROOM.h, ROOM.d);
const roomWire = new THREE.LineSegments(
  new THREE.EdgesGeometry(roomGeo),
  new THREE.LineBasicMaterial({ color: 0x444444 })
);
roomWire.position.set(ROOM.w / 2, ROOM.h / 2, ROOM.d / 2);
scene.add(roomWire);

// Floor grid — 100×100 meter grid centered on the room
const gridSize = 100;
const gridHelper = new THREE.GridHelper(gridSize, gridSize, 0x333333, 0x222222);
gridHelper.position.set(ROOM.w / 2, 0, ROOM.d / 2);
scene.add(gridHelper);

// === Listener mesh ===
const listenerGroup = new THREE.Group();

// Body sphere
const listenerSphere = new THREE.Mesh(
  new THREE.SphereGeometry(0.15, 16, 16),
  new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x333333 })
);
listenerGroup.add(listenerSphere);

// Direction arrow (cone pointing forward)
const arrowGeo = new THREE.ConeGeometry(0.08, 0.3, 8);
arrowGeo.rotateX(Math.PI / 2); // point along +Z in local space
arrowGeo.translate(0, 0, 0.25);
const arrowMesh = new THREE.Mesh(
  arrowGeo,
  new THREE.MeshStandardMaterial({ color: 0x4fc3f7, emissive: 0x1a6080 })
);
listenerGroup.add(arrowMesh);

// Hearing pattern — 3D wireframe (matches Rust Cone { inner: 15°, outer: 45°, outer_gain: 0.3 })
const hearingMesh = createPatternMesh(HEARING_PATTERN, 0x4fc3f7);
listenerGroup.add(hearingMesh);

scene.add(listenerGroup);

// Source visuals — created dynamically from engine scene_state
let sourceMeshes = [];
let falloffClouds = [];

// === Speaker meshes (green boxes at room positions) ===
let speakerMeshes = SPEAKERS.map(sp => {
  const group = createSpeakerMesh(sp);
  scene.add(group);
  return group;
});
updateSpeakerVisibility();

// Gain lines and distance labels — created dynamically from engine scene_state
let gainLines = [];
let distLabels = [];
function updateDistLabel(label, text, color) {
  if (label.lastText === text) return;
  label.lastText = text;
  const { canvas, ctx, tex } = label;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.roundRect(0, 0, canvas.width, canvas.height, 4);
  ctx.fill();
  ctx.fillStyle = color;
  ctx.font = '15px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, canvas.width / 2, canvas.height / 2);
  tex.needsUpdate = true;
}


// Source HUD controls — created dynamically from engine scene_state
const sourcesPanel = document.getElementById('sources-panel');
let gainReadouts = [];
let sourceOrigSpeed = [];
let sourcePaused = [];

// === Raycaster for dragging ===
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0); // Y=0 plane (floor)
const intersection = new THREE.Vector3();

function onPointerDown(e) {
  if (e.button !== 0) return; // left click only

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Check listener first
  if (raycaster.intersectObject(listenerSphere, true).length > 0) {
    dragTarget = 'listener';
    controls.enabled = false;
    return;
  }

  // Check source spheres
  for (let i = 0; i < sourceMeshes.length; i++) {
    if (raycaster.intersectObject(sourceMeshes[i], false).length > 0) {
      dragTarget = i;
      controls.enabled = false;
      return;
    }
  }
}

function onPointerMove(e) {
  if (dragTarget === null) return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  if (!raycaster.ray.intersectPlane(dragPlane, intersection)) return;

  if (dragTarget === 'listener') {
    // Clamp listener to room bounds
    const margin = 0.2;
    listener.x = Math.max(margin, Math.min(ROOM.w - margin, intersection.x));
    listener.y = Math.max(margin, Math.min(ROOM.d - margin, ROOM.d - intersection.z));
    sendListener();
  } else {
    // Drag source — free placement, no bounds
    const i = dragTarget;
    const s = SOURCES[i];
    const ax = intersection.x;
    const ay = ROOM.d - intersection.z; // Three Z -> Atrium Y (y-flipped)
    // Update local state so the animation loop uses the new position
    s.x = ax;
    s.y = ay;
    s.cx = ax; // also update orbit center if it had one
    s.cy = ay;
    s.r = 0;   // stop orbiting once manually placed
    s.speed = 0;
    sourceMeshes[i].position.copy(toThree(ax, ay, s.z));
    send({ type: 'set_source_position', index: i, x: ax, y: ay, z: s.z });
  }
}

function onPointerUp() {
  if (dragTarget !== null) {
    dragTarget = null;
    controls.enabled = true;
  }
}

let spaceHeld = false;
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    spaceHeld = true;
    controls.enableZoom = false;
    controls.mouseButtons.RIGHT = THREE.MOUSE.PAN;
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    spaceHeld = false;
    controls.enableZoom = true;
    controls.mouseButtons.RIGHT = THREE.MOUSE.ROTATE;
  }
});

function onWheel(e) {
  if (e.target !== renderer.domElement) return;
  if (!spaceHeld) return; // let OrbitControls handle zoom
  listener.yaw -= e.deltaY * 0.003;
  listener.yaw = ((listener.yaw % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  sendListener();
  e.preventDefault();
}

renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerup', onPointerUp);
renderer.domElement.addEventListener('wheel', onWheel, { passive: false });

// === Gain slider ===
const gainSlider = document.getElementById('gain-slider');
const gainVal = document.getElementById('gain-val');
gainSlider.addEventListener('input', () => {
  const g = parseFloat(gainSlider.value) / 100;
  gainVal.textContent = g.toFixed(2);
  send({ type: 'set_gain', gain: g });
});

// === Render mode buttons ===
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const mode = btn.dataset.mode;
    if (mode === currentRenderMode) return;
    currentRenderMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateSpeakerVisibility();
    send({ type: 'set_render_mode', mode });
  });
});

// === Atmosphere controls (ISO 9613-1) ===
const atmoTempSlider = document.getElementById('atmo-temp');
const atmoHumiditySlider = document.getElementById('atmo-humidity');

// Client-side ISO 9613-1 for readout display
function iso9613Alpha(freq, tempC, humPct) {
  const T_REF = 293.15, T_TRIPLE = 273.16, P_REF = 101.325;
  const tK = tempC + 273.15;
  const tRel = tK / T_REF;
  const pSatRatio = Math.pow(10, -6.8346 * Math.pow(T_TRIPLE / tK, 1.261) + 4.6151);
  const h = humPct * pSatRatio;
  const frO = 24.0 + 4.04e4 * h * (0.02 + h) / (0.391 + h);
  const frN = Math.pow(tRel, -0.5) * (9.0 + 280.0 * h * Math.exp(-4.170 * (Math.pow(tRel, -1/3) - 1.0)));
  const f2 = freq * freq;
  const classical = 1.84e-11 * Math.sqrt(tRel);
  const vibO2 = Math.pow(tRel, -2.5) * 0.01275 * Math.exp(-2239.1 / tK) / (frO + f2 / frO);
  const vibN2 = Math.pow(tRel, -2.5) * 0.1068 * Math.exp(-3352.0 / tK) / (frN + f2 / frN);
  const alpha = 8.686 * f2 * (classical + vibO2 + vibN2);
  return isFinite(alpha) ? alpha : 0;
}

function updateAtmoReadout() {
  const t = parseFloat(atmoTempSlider.value);
  const h = parseFloat(atmoHumiditySlider.value);
  const a1k = iso9613Alpha(1000, t, h).toFixed(3);
  const a4k = iso9613Alpha(4000, t, h).toFixed(3);
  const a8k = iso9613Alpha(8000, t, h).toFixed(3);
  document.getElementById('atmo-readout').textContent =
    `α: 1kHz ${a1k} · 4kHz ${a4k} · 8kHz ${a8k} dB/m`;
}

atmoTempSlider.addEventListener('input', () => {
  const t = parseFloat(atmoTempSlider.value);
  document.getElementById('atmo-temp-val').textContent = t + '°C';
  updateAtmoReadout();
  send({ type: 'set_atmosphere', temperature: t, humidity: parseFloat(atmoHumiditySlider.value) });
});
atmoHumiditySlider.addEventListener('input', () => {
  const h = parseFloat(atmoHumiditySlider.value);
  document.getElementById('atmo-humidity-val').textContent = h + '%';
  updateAtmoReadout();
  send({ type: 'set_atmosphere', temperature: parseFloat(atmoTempSlider.value), humidity: h });
});
updateAtmoReadout();

// === Reset scene button ===
document.getElementById('reset-btn').addEventListener('click', () => {
  send({ type: 'reset_scene' });
});

// === Rebuild entire scene from engine state (called on WebSocket scene_state message) ===
function rebuildFromSceneState(msg) {
  // Update room dimensions
  if (msg.room) {
    ROOM.w = msg.room.width;
    ROOM.d = msg.room.depth;
    ROOM.h = msg.room.height;
  }

  // Update distance model (global params shared across all sources)
  if (msg.distance_model) {
    DIST_MODEL.refDist = msg.distance_model.ref_distance;
    DIST_MODEL.maxDist = msg.distance_model.max_distance;
    DIST_MODEL.rolloff = msg.distance_model.rolloff;
  }

  // Update listener from engine
  if (msg.listener) {
    listener.x = msg.listener.x;
    listener.y = msg.listener.y;
    listener.z = msg.listener.z;
    listener.yaw = msg.listener.yaw;
  }

  // Update render mode
  if (msg.render_mode) {
    currentRenderMode = msg.render_mode;
    document.querySelectorAll('.mode-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === currentRenderMode);
    });
  }

  // Update atmosphere controls
  if (msg.atmosphere) {
    atmoTempSlider.value = msg.atmosphere.temperature_c;
    document.getElementById('atmo-temp-val').textContent = msg.atmosphere.temperature_c + '°C';
    atmoHumiditySlider.value = msg.atmosphere.humidity_pct;
    document.getElementById('atmo-humidity-val').textContent = msg.atmosphere.humidity_pct + '%';
    updateAtmoReadout();
  }

  // Update master gain
  if (msg.master_gain !== undefined) {
    const pct = Math.round(msg.master_gain * 100);
    gainSlider.value = pct;
    gainVal.textContent = msg.master_gain.toFixed(2);
  }

  // Rebuild speakers
  if (msg.speakers) rebuildSpeakers(msg);

  // Rebuild sources
  if (msg.sources) rebuildSourcesFromState(msg.sources);
}

function rebuildSourcesFromState(srcData) {
  // Remove old Three.js objects
  sourceMeshes.forEach(m => scene.remove(m));
  falloffClouds.forEach(m => scene.remove(m));
  gainLines.forEach(m => scene.remove(m));
  distLabels.forEach(d => scene.remove(d.sprite));

  // Parse source color from hex string "#rrggbb" to integer
  function parseColor(hex) {
    return parseInt(hex.replace('#', ''), 16);
  }

  // Build directivity pattern object from engine data
  function parsePattern(directivity, alpha) {
    if (directivity === 'omni') return { type: 'omni' };
    return { type: 'polar', alpha: alpha };
  }

  // Build SOURCES array from engine data
  SOURCES = srcData.map(s => ({
    name: s.name,
    color: parseColor(s.color),
    cx: s.position[0],
    cy: s.position[1],
    x: s.position[0],
    y: s.position[1],
    z: s.position[2],
    r: s.orbit_radius,
    speed: s.orbit_speed,
    spl: s.spl,
    refDist: s.ref_dist,
    amplitude: s.amplitude,
    audibleR: s.audible_radius,
    pattern: parsePattern(s.directivity, s.directivity_alpha),
    spread: s.spread,
  }));

  // Reset state arrays
  sourceMuted = SOURCES.map(() => false);
  sourceOrigSpeed = SOURCES.map(s => s.speed);
  sourcePaused = SOURCES.map(() => false);

  // Create source meshes
  sourceMeshes = SOURCES.map(s => {
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 16, 16),
      new THREE.MeshStandardMaterial({ color: s.color, emissive: s.color, emissiveIntensity: 0.3 })
    );
    scene.add(mesh);
    // Label sprite
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 32;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#' + s.color.toString(16).padStart(6, '0');
    ctx.font = '20px monospace';
    ctx.fillText(s.name, 4, 22);
    const tex = new THREE.CanvasTexture(canvas);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
    sprite.scale.set(1, 0.25, 1);
    sprite.position.y = 0.3;
    mesh.add(sprite);
    return mesh;
  });

  // Audibility boundary: shell at the distance where SPL drops to hearing threshold.
  // audible_radius is computed by the engine using ISO 9613 free-field propagation:
  //   d_audible = 10^((reference_spl - spl_threshold) / 20)
  const FILL_COUNT = 1000;        // volume-fill particles inside audible zone
  const SHELL_COUNT = 10000;       // boundary shell particles

  falloffClouds = SOURCES.map(s => {
    const audibleR = s.audibleR;
    const TOTAL = FILL_COUNT + SHELL_COUNT;
    const positions = new Float32Array(TOTAL * 3);
    const alphas = new Float32Array(TOTAL);

    // Volume fill: particles distributed inside the audible zone
    for (let p = 0; p < FILL_COUNT; p++) {
      const r = audibleR * Math.cbrt(Math.random());
      const theta = 2 * Math.PI * Math.random();
      const phi = Math.acos(2 * Math.random() - 1);
      positions[p * 3]     = r * Math.sin(phi) * Math.cos(theta);
      positions[p * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[p * 3 + 2] = r * Math.cos(phi);
      // Alpha from inverse distance gain
      const dist = Math.max(r, s.refDist);
      alphas[p] = (s.refDist / dist) * 0.04;
    }

    // Boundary shell: dense ring at the audibility edge
    for (let p = 0; p < SHELL_COUNT; p++) {
      const idx = FILL_COUNT + p;
      const jitter = 1.0 + (Math.random() - 0.5) * 0.06;  // ±3% thickness
      const r = audibleR * jitter;
      const theta = 2 * Math.PI * Math.random();
      const phi = Math.acos(2 * Math.random() - 1);
      positions[idx * 3]     = r * Math.sin(phi) * Math.cos(theta);
      positions[idx * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[idx * 3 + 2] = r * Math.cos(phi);
      alphas[idx] = 0.06;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));
    const material = new THREE.ShaderMaterial({
      uniforms: {
        color: { value: new THREE.Color(s.color) },
      },
      vertexShader: `
        attribute float alpha;
        varying float vAlpha;
        void main() {
          vAlpha = alpha;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = 5.0;
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        uniform vec3 color;
        varying float vAlpha;
        void main() {
          float d = length(gl_PointCoord - vec2(0.5));
          if (d > 0.5) discard;
          gl_FragColor = vec4(color, vAlpha);
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });
    const points = new THREE.Points(geometry, material);
    scene.add(points);
    return points;
  });

  // Create gain lines
  gainLines = SOURCES.map(s => {
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0, 0,0,0], 3));
    const mat = new THREE.LineBasicMaterial({
      color: s.color, transparent: true, opacity: 0.5,
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    return line;
  });

  // Create distance labels
  distLabels = SOURCES.map(() => {
    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 28;
    const ctx = canvas.getContext('2d');
    const tex = new THREE.CanvasTexture(canvas);
    tex.minFilter = THREE.LinearFilter;
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false }));
    sprite.scale.set(0.9, 0.2, 1);
    sprite.visible = false;
    scene.add(sprite);
    return { canvas, ctx, tex, sprite, lastText: '' };
  });

  // Rebuild HUD source controls
  gainReadouts = [];
  // Remove old source controls from panel (keep the <h3> header)
  while (sourcesPanel.children.length > 1) {
    sourcesPanel.removeChild(sourcesPanel.lastChild);
  }

  SOURCES.forEach((s, i) => {
    const row = document.createElement('div');
    row.className = 'source-row';
    const nameSpan = document.createElement('span');
    nameSpan.className = 'source-name';
    nameSpan.style.color = '#' + s.color.toString(16).padStart(6, '0');
    nameSpan.textContent = s.name;
    const btn = document.createElement('button');
    btn.className = 'mute-btn';
    btn.textContent = 'mute';
    btn.addEventListener('click', () => {
      sourceMuted[i] = !sourceMuted[i];
      btn.textContent = sourceMuted[i] ? 'muted' : 'mute';
      btn.classList.toggle('muted', sourceMuted[i]);
      sourceMeshes[i].material.opacity = sourceMuted[i] ? 0.3 : 1.0;
      sourceMeshes[i].material.transparent = sourceMuted[i];
      send({ type: 'set_source_muted', index: i, muted: sourceMuted[i] });
    });
    row.appendChild(nameSpan);
    row.appendChild(btn);

    // Pause button for orbiting sources
    if (s.r > 0 && s.speed !== 0) {
      const pauseBtn = document.createElement('button');
      pauseBtn.className = 'pause-btn';
      pauseBtn.textContent = '\u23F8';
      pauseBtn.addEventListener('click', () => {
        sourcePaused[i] = !sourcePaused[i];
        if (sourcePaused[i]) {
          s._frozenAngle = (s.speed * (performance.now() / 1000 - startTime)) % (Math.PI * 2);
          s.speed = 0;
          send({ type: 'set_source_orbit_speed', index: i, speed: 0 });
          send({ type: 'set_source_orbit_angle', index: i, angle: s._frozenAngle });
          pauseBtn.textContent = '\u25B6';
          pauseBtn.classList.add('paused');
        } else {
          s.speed = sourceOrigSpeed[i];
          send({ type: 'set_source_orbit_speed', index: i, speed: s.speed });
          pauseBtn.textContent = '\u23F8';
          pauseBtn.classList.remove('paused');
        }
      });
      row.appendChild(pauseBtn);
    }

    sourcesPanel.appendChild(row);

    // Orbit controls for orbiting sources
    if (s.r > 0 || s.speed !== 0) {
      const ctrl = document.createElement('div');
      ctrl.className = 'orbit-controls';
      const rRow = document.createElement('div');
      rRow.className = 'row';
      rRow.innerHTML = `<label>Radius</label><input type="range" min="0.2" max="3" value="${s.r}" step="0.1" class="orbit-radius"><span class="val">${s.r.toFixed(1)}m</span>`;
      const rSlider = rRow.querySelector('input');
      const rVal = rRow.querySelector('.val');
      rSlider.addEventListener('input', () => {
        s.r = parseFloat(rSlider.value);
        rVal.textContent = s.r.toFixed(1) + 'm';
        send({ type: 'set_source_orbit_radius', index: i, radius: s.r });
      });
      ctrl.appendChild(rRow);
      const aRow = document.createElement('div');
      aRow.className = 'row';
      aRow.innerHTML = `<label>Angle</label><input type="range" min="0" max="360" value="0" step="1" class="orbit-angle"><span class="val">0°</span>`;
      const aSlider = aRow.querySelector('input');
      const aVal = aRow.querySelector('.val');
      aSlider.addEventListener('input', () => {
        const deg = parseFloat(aSlider.value);
        const rad = deg * Math.PI / 180;
        s._frozenAngle = rad;
        aVal.textContent = deg.toFixed(0) + '°';
        send({ type: 'set_source_orbit_angle', index: i, angle: rad });
      });
      ctrl.appendChild(aRow);
      sourcesPanel.appendChild(ctrl);
    }

    // Gain breakdown readout
    const readout = document.createElement('div');
    readout.className = 'gain-readout';
    readout.textContent = 'dist:- emit:- hear:- = -';
    sourcesPanel.appendChild(readout);
    gainReadouts.push(readout);
  });
}

// === WebSocket ===
function connect() {
  ws = new WebSocket('ws://' + location.host + '/ws');
  ws.onopen = () => {
    document.getElementById('status-dot').className = 'dot connected';
    document.getElementById('status-text').textContent = 'Connected';
    // Send current state on reconnect
    sendListener();
    send({ type: 'set_gain', gain: parseFloat(gainSlider.value) / 100 });
    send({ type: 'set_render_mode', mode: currentRenderMode });
  };
  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'scene_state') rebuildFromSceneState(msg);
      else if (msg.type === 'speaker_layout') rebuildSpeakers(msg);
      else if (msg.type === 'telemetry') latestTelemetry = msg;
    } catch (e) { /* ignore non-JSON or unknown messages */ }
  };
  ws.onclose = () => {
    document.getElementById('status-dot').className = 'dot disconnected';
    document.getElementById('status-text').textContent = 'Disconnected';
    setTimeout(connect, 1000);
  };
  ws.onerror = () => ws.close();
}

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

function sendListener() {
  send({ type: 'set_listener', x: listener.x, y: listener.y, z: listener.z, yaw: listener.yaw });
  // Update HUD
  document.getElementById('listener-pos').textContent =
    `${listener.x.toFixed(1)}, ${listener.y.toFixed(1)}, ${listener.z.toFixed(1)}`;
  document.getElementById('listener-yaw').textContent = `${(listener.yaw * 180 / Math.PI).toFixed(0)}°`;
}

// === Animation loop ===
function animate() {
  requestAnimationFrame(animate);

  const now = performance.now() / 1000;
  const elapsed = now - startTime;

  // Update listener mesh position and rotation
  listenerGroup.position.copy(toThree(listener.x, listener.y, listener.z));
  // Yaw: Atrium 0=+X, Three.js rotation around Y axis
  // In Atrium coords: forward = (cos(yaw), sin(yaw), 0)
  // In Three.js coords (y-flipped): forward = (cos(yaw), 0, -sin(yaw))
  // rotateY(θ) maps local +Z to (sin(θ), 0, cos(θ)), so θ = yaw + π/2
  listenerGroup.rotation.y = listener.yaw + Math.PI / 2;

  // Update source positions and visuals
  // Positions come from engine telemetry (authoritative) or local orbit animation (fallback)
  SOURCES.forEach((s, i) => {
    // Use engine telemetry position if available, otherwise local orbit animation
    let ax, ay, az;
    const t = latestTelemetry && latestTelemetry.sources[i];
    if (t) {
      ax = t.x; ay = t.y; az = t.z;
    } else if (s.r > 0 && (s.speed !== 0 || sourcePaused[i])) {
      const orbitAngle = sourcePaused[i] ? (s._frozenAngle || 0) : s.speed * elapsed;
      ax = s.cx + s.r * Math.cos(orbitAngle);
      ay = s.cy + s.r * Math.sin(orbitAngle);
      az = s.z;
    } else {
      ax = s.x ?? s.cx;
      ay = s.y ?? s.cy;
      az = s.z;
    }
    sourceMeshes[i].position.copy(toThree(ax, ay, az));
    falloffClouds[i].position.copy(sourceMeshes[i].position);
    falloffClouds[i].visible = !sourceMuted[i];

    // Gain data from engine telemetry
    const gains = t || { dist: 0, emit: 0, hear: 0, total: 0, db: -999, distance: 0 };

    // Update gain line endpoints and opacity
    const srcPos = toThree(ax, ay, az);
    const lstPos = toThree(listener.x, listener.y, listener.z);
    const posArr = gainLines[i].geometry.attributes.position.array;
    posArr[0] = srcPos.x; posArr[1] = srcPos.y + 0.02; posArr[2] = srcPos.z;
    posArr[3] = lstPos.x; posArr[4] = lstPos.y + 0.02; posArr[5] = lstPos.z;
    gainLines[i].geometry.attributes.position.needsUpdate = true;
    gainLines[i].material.opacity = sourceMuted[i] ? 0.05 : (0.1 + gains.total * 0.7);
    gainLines[i].visible = true;

    // Update distance label at midpoint of gain line
    // Received SPL: physics-based inverse square law + directivity/hearing
    //   SPL(d) = SPL_ref - 20·log₁₀(d) + 20·log₁₀(emit) + 20·log₁₀(hear)
    const dl = distLabels[i];
    const d = Math.max(1, gains.distance); // SPL defined at 1m
    const splAtDist = s.spl - 20 * Math.log10(d);
    const emitDb = gains.emit > 0 ? 20 * Math.log10(gains.emit) : -999;
    const hearDb = gains.hear > 0 ? 20 * Math.log10(gains.hear) : -999;
    const receivedSpl = splAtDist + emitDb + hearDb;
    const splText = isFinite(receivedSpl) ? receivedSpl.toFixed(0) : '-∞';
    const distText = `${gains.distance.toFixed(1)}m ${splText}dB`;
    const hexColor = '#' + SOURCES[i].color.toString(16).padStart(6, '0');
    updateDistLabel(dl, distText, hexColor);
    dl.sprite.position.set(
      (srcPos.x + lstPos.x) / 2,
      (srcPos.y + lstPos.y) / 2 + 0.15,
      (srcPos.z + lstPos.z) / 2
    );
    dl.sprite.visible = !sourceMuted[i];

    // Update HUD gain readout
    gainReadouts[i].textContent = sourceMuted[i] ? 'muted'
      : `dist:${gains.dist.toFixed(2)} emit:${gains.emit.toFixed(2)} hear:${gains.hear.toFixed(2)} = ${splText} dBSPL`;
  });

  controls.update();
  renderer.render(scene, camera);
}

// === Resize ===
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// === Start ===
connect();
animate();
sendListener(); // update HUD with initial values
</script>
</body>
</html>
