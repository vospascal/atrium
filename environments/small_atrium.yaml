# Environment: Small Atrium
# Indoor listening room — moderate reverb, hard reflective walls.
# Mirrors the original rooms/atrium_6x4.yaml with acoustic properties added.
#
# Coordinate system: X = left/right, Y = front/back, Z = up/down
# Spawn defaults to center of room floor: [3, 2, 0].

width: 6.0    # meters (X axis)
depth: 4.0    # meters (Y axis)
height: 3.0   # meters (Z axis)

ground_factor: 0.0         # hard floor (concrete/tile)
wall_reflectivity: 0.9     # typical indoor room

walls:
  default: hard_wall
  floor: carpet             # carpeted floor absorbs more bass
  ceiling: ceiling_tile     # acoustic ceiling tiles
