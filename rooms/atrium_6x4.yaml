# Room: Small Atrium
# Axis-aligned rectangular room used for early reflection computation
# and reverb delay sizing. Listener and sources are placed within these bounds.
#
# Coordinate system: X = left/right, Y = front/back, Z = up/down
# Origin (0,0,0) is at the rear-left floor corner.

width: 6.0    # meters (X axis)
depth: 4.0    # meters (Y axis)
height: 3.0   # meters (Z axis)
