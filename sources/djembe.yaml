# Source: Djembe
# West African goblet drum — loud percussive transients.
# Played with hands, projects sound forward from the drum head.
#
# Available directivity patterns: omni, cardioid, supercardioid

path: assets/djembe.mp3
reference_spl: 75.0        # ~75 dB SPL at 1m (moderate playing)
directivity: cardioid       # forward-projecting polar pattern (alpha=0.5)
