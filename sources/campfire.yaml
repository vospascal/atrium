# Source: Campfire
# Wood fire crackling — quiet ambient sound, radiates in all directions.
# Uses spread to simulate a spatially wide source (not a point).

path: assets/campfire.mp3
reference_spl: 35.0        # ~30-40 dB SPL at 1m (indoor fireplace crackle)
directivity: omni           # radiates equally in all directions
spread: 0.3                 # MDAP spread (0.0 = point source, 1.0 = full surround)
